services:
  yunlv-wuyou:
    build:
      context: ..
      dockerfile: Dockerfile
    image: yunlv-wuyou:mvp
    environment:
      PORT: "5173"
      NODE_ENV: production
      YUNLV_RUNTIME_DIR: /app/.runtime
      YUNLV_SEED_DB: /app/data/mock-db.json
      YUNLV_AUTH_SECRET: ${YUNLV_AUTH_SECRET:-replace-with-a-long-random-secret}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DB_CLIENT: ${DB_CLIENT:-json}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-yunlv_wuyou}
      DB_USER: ${DB_USER:-yunlv}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
    ports:
      - "5173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - yunlv-runtime:/app/.runtime
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  yunlv-runtime:
