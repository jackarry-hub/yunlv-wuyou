# 云旅无忧 Nginx 配置

# ========================================
# 生产环境 Nginx 反向代理配置
# 适用于：Ubuntu 22.04 / CentOS 8+ / Alpine
# ========================================

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name yunlv-wuyou.com www.yunlv-wuyou.com;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name yunlv-wuyou.com www.yunlv-wuyou.com;

    # SSL 证书路径（Let's Encrypt）
    ssl_certificate     /etc/letsencrypt/live/yunlv-wuyou.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yunlv-wuyou.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 安全头
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志
    access_log /var/log/nginx/yunlv-access.log;
    error_log  /var/log/nginx/yunlv-error.log;

    # 请求体大小限制
    client_max_body_size 10M;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ========================================
    # API 反向代理 → Node.js 后端
    # ========================================
    location /api/ {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        # WebSocket 支持（预留）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========================================
    # 管理后台
    # ========================================
    location /admin/ {
        proxy_pass http://127.0.0.1:5173/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========================================
    # 向导端
    # ========================================
    location /guide/ {
        proxy_pass http://127.0.0.1:5173/guide/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ========================================
    # 商户端
    # ========================================
    location /merchant/ {
        proxy_pass http://127.0.0.1:5173/merchant/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ========================================
    # 用户端（H5版本，微信内访问）
    # ========================================
    location /user/ {
        proxy_pass http://127.0.0.1:5173/user/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ========================================
    # 静态资源（共享文件）
    # ========================================
    location /shared/ {
        proxy_pass http://127.0.0.1:5173/shared/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ========================================
    # 首页/入口
    # ========================================
    location / {
        proxy_pass http://127.0.0.1:5173/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 健康检查（负载均衡器用）
    location = /health {
        proxy_pass http://127.0.0.1:5173/api/health;
        access_log off;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

